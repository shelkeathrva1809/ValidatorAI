<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ValidatorAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f4f8;
        background-image: 
          radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.03) 0px, transparent 50%), 
          radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.03) 0px, transparent 50%);
        background-attachment: fixed;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* 3D Animation Utilities */
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotateX(5deg) rotateY(-5deg); }
        50% { transform: translateY(-20px) rotateX(8deg) rotateY(-2deg); }
      }
      @keyframes float-medium {
        0%, 100% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-15px) translateX(5px); }
      }
      @keyframes float-fast {
        0%, 100% { transform: translateY(0px) rotate(-3deg); }
        50% { transform: translateY(-10px) rotate(3deg); }
      }

      .animate-float-slow {
        animation: float-slow 8s ease-in-out infinite;
      }
      .animate-float-medium {
        animation: float-medium 6s ease-in-out infinite;
      }
      .animate-float-fast {
        animation: float-fast 5s ease-in-out infinite;
      }

      .hero-grid-bg {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      }
    </style>

  }
}
</script>
